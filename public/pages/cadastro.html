<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="https://www.cps.sp.gov.br/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSM | Cadastro</title>
    <link rel="stylesheet" href="/assets/css/main.css" />
  </head>
  <body>
    <main class="card auth-card">
      <h1 class="title">Cadastro</h1>
      <form class="auth-form" action="#" method="post">
        <div>
          <label for="email">E-mail</label>
          <input type="email" id="email" required />
        </div>
        <div>
          <label for="senha">Senha</label>
          <input type="password" id="senha" required />
        </div>
        <div>
          <label for="confirmacao">Confirmação de senha</label>
          <input type="password" id="confirmacao" required />
        </div>
        <div class="actions">
          <button class="btn-link" type="submit">Cadastrar</button>
          <a class="btn-link" href="/login">Ir para login</a>
          <a class="btn-secondary" href="/">Voltar</a>
        </div>
      </form>
    </main>
  </body>
</html>
